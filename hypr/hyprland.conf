source = $HOME/.config/hypr/scheme/current.conf

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# Dual monitor setup
monitor=DP-2, 2560x1440@144 highres,0x0, 1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
  
# Set programs that you use
$terminal = alacritty
$fileManager = thunar
$main_editor = neovide
$menu = killall wofi; wofi --show drun --prompt Search --height 16% --width 20%   --insensitive # --allow-images

#################
### AUTOSTART ###
#################

exec-once = ln -s $XDG_RUNTIME_DIR/hypr /tmp/hypr &

# AVOID SINCE CAELESTIA SOLVE WALLPAPER SETUP
# exec-once = hyprpaper &
# exec-once = ~/.config/hypr/scripts/set_wallpaper.sh 
# exec-once = caelestia shell -d &

exec-once = hyprctl setcursor Bibata-Modern-Classic 16
#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_SESSION_DESKTOP GDK_BACKEND QT_QPA_PLATFORM SDL_VIDEODRIVER _JAVA_AWT_WM_NONREPARENTING QT_QPA_PLATFORMTHEME 

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland
env = OZONE_PLATFORM,wayland

env = SDL_VIDEODRIVER,wayland
env = _JAVA_AWT_WM_NONREPARENTING,1
env = QT_QPA_PLATFORMTHEME,qt5ct
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,16
env = HYPRCURSOR_SIZE,16
env = ELECTRON_OZONE_PLATFORM_HINT,auto
#####################
### LOOK AND FEEL ###
#####################

# https://wiki.hyprland.org/Configuring/Variables/#general
general { 
    gaps_in = 4
    gaps_out = 6
    border_size = 4
    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgb($term1) rgb($term10) rgb($term6) 45deg
    col.inactive_border = rgb($surface0) rgb($outlineVariant) 90deg
    # col.active_border = rgb($primary) rgb($tertiary) rgb($mauve) rgb($outlineVariant) 30deg
    # col.inactive_border = rgb($surfaceContainerLow) rgb($outlineVariant) 45deg
    resize_on_border = true
    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
    layout = master
}


# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = inherit
    orientation = right
    mfact = 0.65
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
    font_family = "Terminess Nerd Font"
    on_focus_under_fullscreen=2 # Set to 1 to make new windows take over fullscreen 2 to unfullscreen and set to the side of the screen that new windows are on 0 to defaault to put behind the current fullscreen window
    focus_on_activate = true
    vrr = 2
}


#############
### INPUT ###
#############
# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    repeat_delay=110
    repeat_rate = 180
    accel_profile = adaptive
    kb_layout = us
    #kb_variant =
    #kb_model =
    #kb_options =
    #kb_rules =
    follow_mouse = 1
    sensitivity = 0.7 # -1.0 - 1.0, 0 means no modification.
    touchpad {
        natural_scroll = true
    }
}

cursor{
    inactive_timeout = 60
    hide_on_key_press = true
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    # workspace_swipe = true
}
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = 2
}

$modules = $HOME/.config/hypr/modules
source = $modules/animations.conf
source = $modules/decorations.conf
source = $modules/keybindings.conf
source = $modules/windowrules.conf
