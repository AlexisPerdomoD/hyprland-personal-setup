animations {
    enabled = true
    
    # Beziers refinadas para fluidez
    bezier = smoothIn, 0.25, 0.1, 0.25, 1
    bezier = smoothOut, 0.34, 0, 0.25, 1
    bezier = quickSnap, 0.33, 1, 0.68, 1
    bezier = workspace, 0.25, 0.46, 0.45, 0.94
    bezier = appleIn, 0.2, 0.8, 0.2, 1
    bezier = appleOut, 0.4, 0, 0.6, 1
    bezier = appleMove, 0.25, 0.9, 0.25, 1
    bezier = borderFlow, 0.45, 0, 0.55, 1
    bezier = resizeSmooth, 0.16, 1, 0.3, 1
    # Windows
    animation = windowsIn, 1, 3, appleIn
    animation = windowsOut, 1, 2.5, appleOut
    # animation = windowsMove, 1, 2.5, appleIn
    # animation = windowsMove, 1, 3.5, quickSnap, slide
    animation = windowsMove, 1, 4, resizeSmooth, slide
    # Layers
    animation = layersIn, 1, 2.5, smoothIn, slide
    animation = layersOut, 1, 2, smoothOut, slide
    animation = fadeLayers, 1, 2.5, smoothIn
    # Borders - animación infinita fluida
    animation = border, 1, 2, borderFlow
    animation = borderangle, 1, 100, borderFlow, loop
    # Fade - rápido y natural
    animation = fade, 1, 2.5, smoothIn
    animation = fadeDim, 1, 3, smoothIn
    # Workspaces - clave para eliminar el efecto brusco
    animation = workspaces, 1, 2, workspace, slidefade 25%
    animation = specialWorkspace, 1, 2, workspace, slidevert
}


