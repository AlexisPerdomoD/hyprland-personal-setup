##############################
### WINDOWS AND WORKSPACES ###
##############################

# ######## Window rules ########
# windowrule = opaque, class:foot|equibop  # They use native transparency
windowrule = center on, match:float true, match:xwayland false  # Center all floating windows (not xwayland cause popups)
# Fullscreen
windowrule = fullscreen on, match:class ^(neovide)$ 
# Float
windowrule = float on, match:title ^('Settings')$
windowrule =float on, match:class guifetch   # FlafyDev/guifetch
# windowrule = float, class:yad
# windowrule = float, class:zenity
# windowrule = float, class:wev
# windowrule = float, class:org\.gnome\.FileRoller
# windowrule = float, class:file-roller  # WHY IS THERE TWOOOOOOOOOOOOOOOO
windowrule = float on, match:class  blueman-manager
windowrule = float on, match:class com\.github\.GradienceTeam\.Gradience 
windowrule = float on, match:class feh 
windowrule = float on, match:class imv 
windowrule = float on, match:class system-config-printer 
windowrule = float on, match:class org\.quickshell 

# Float, resize and center
windowrule = float on, match:class foot match:title mtui
windowrule = size 60% 70%, match:class foot match:title nmtui
windowrule = center on, match:class foot match:title nmtui

windowrule = float on, match:class com.mitchellh.ghostty
windowrule = size 60% 60%, match:class com.mitchellh.ghostty
windowrule = center on, match:class com.mitchellh.ghostty

windowrule = float on, match:class org\.gnome\.Settings
windowrule = size 70% 80%, match:class org\.gnome\.Settings
windowrule = center on, match:class org\.gnome\.Settings

windowrule = float on, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = size 60% 70%, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser
windowrule = center on, match:class org\.pulseaudio\.pavucontrol|yad-icon-browser

windowrule = float on, match:class nwg-look
windowrule = size 50% 60%, match:class nwg-look
windowrule = center on, match:class nwg-look

windowrule = float on, match:title nemo
windowrule = size 65% 65%, match:title nemo
windowrule = center on, match:title nemo
# windowrulev2 = opacity 0.95 0.75,class:^(kitty)$
windowrule = opacity 0.0 override 0.0 override,match:class ^(xwaylandvideobridge)$
windowrule = no_anim on,match:class ^(xwaylandvideobridge)$
windowrule = no_focus on,match:class ^(xwaylandvideobridge)$
windowrule = no_initial_focus on,match:class ^(xwaylandvideobridge)$

windowrule = float on, match:class ^(vlc)$
windowrule = size 80% 80%, match:class ^(vlc)$
windowrule = center on, match:class ^(vlc)$

windowrule = float on, match:class ^(mvp)$
windowrule = size 80% 80%, match:class ^(mvp)$
windowrule = center on, match:class ^(mvp)$

windowrule = float on, match:class ^(pavucontrol-qt)$
windowrule = size 40% 40%, match:class ^(pavucontrol-qt)$
windowrule = center on, match:class ^(pavucontrol-qt)$

windowrule = float on, match:class ^(blueman-manager)$
windowrule = size 25% 40%,match:class ^(blueman-manager)$
windowrule = center on, match:class ^(blueman-manager)$

windowrule = float on, match:class ^(.blueman-manager-wrapped)$
windowrule = size 25% 40%, match:class ^(.blueman-manager-wrapped)$
windowrule = center on, match:class ^(.blueman-manager-wrapped)$

windowrule = float on, match:class ^(org.gnome.Nautilus)$
windowrule = size 65% 65%, match:class ^(org.gnome.Nautilus)$
windowrule = center on, match:class ^(org.gnome.Nautilus)$

windowrule = float on, match:title evince
windowrule = size 80% 80%, match:title evince
windowrule = center on, match:title evince

windowrule = float on, match:class ^(xviewer)$
windowrule = size 65% 65%, match:class ^(xviewer)$
windowrule = center on, match:class ^(xviewer)$


windowrule = float on, match:class ^(nwg-look)$
windowrule = size 65% 65%, match:class ^(nwg-look)$
windowrule = center on, match:class ^(nwg-look)$

windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = size 15% 15%, match:title ^(Picture-in-Picture)$
windowrule = move 1.25% 4.5%, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:title ^(Save File)$
windowrule = size 40% 40%, match:title ^(Save File)$

windowrule = float on,match:class firefox, match:title ^(Sign In.*?)$
windowrule = size 25% 40%, match:title ^(Sign In|.*?)$

windowrule = size 50% 50%,match:class ^(hyprland-share-picker)$
windowrule = float on, match:class ^(hyprland-share-picker)$

# Special workspaces
windowrule = workspace special:sysmon, match:class btop
windowrule = workspace special:music, match:class feishin|Spotify|Supersonic
windowrule = workspace special:music, match:initial_title Spotify( Free)?  # Spotify wayland, it has no class for some reason
windowrule = workspace special:communication, match:class discord|equibop|vesktop|whatsapp
windowrule = workspace special:todo, match:class Todoist

# Dialogs
windowrule = float on, match:title (Select|Open)( a)? (File|Folder)(s)?
windowrule = float on, match:title File (Operation|Upload)( Progress)?
windowrule = float on, match:title .* Properties
windowrule = float on, match:title Export Image as PNG
windowrule = float on, match:title GIMP Crash Debug
windowrule = float on, match:title Save As
windowrule = float on, match:title Library

# Picture in picture (resize and move done via script)
windowrule = move 100%-w-2% 100%-w-3%, match:title Picture(-| )in(-| )[Pp]icture  # Initial move so window doesn't shoot across the screen from the center
windowrule = keep_aspect_ratio true, match:title Picture(-| )in(-| )[Pp]icture
windowrule = float on, match:title Picture(-| )in(-| )[Pp]icture
windowrule = pin on, match:title Picture(-| )in(-| )[Pp]icture

# Steam
windowrule = rounding 10, match:title steam, match:class steam
windowrule = float on, match:title Friends List, match:class steam
windowrule = immediate on, match:class steam_app_[0-9]+  # Allow tearing for steam games
windowrule = idle_inhibit always, match:class steam_app_[0-9]+  # Always idle inhibit when playing a steam game

# ATLauncher console
windowrule = float on, match:class com-atlauncher-App, match:title ATLauncher Console

# Autodesk Fusion 360
windowrule = no_blur on, match:title Fusion360|(Marking Menu), match:class fusion360\.exe

# Ugh xwayland popups
windowrule = no_dim on, match:xwayland true, match:title win[0-9]+
windowrule = no_shadow on, match:xwayland true, match:title win[0-9]+
windowrule = rounding 10, match:xwayland true, match:title win[0-9]+



# ######## Layer rules ########
layerrule = animation fade, match:namespace hyprpicker  # Colour picker out animation
layerrule = animation fade, match:namespace logout_dialog  # wlogout
layerrule = animation fade, match:namespace selection  # slurp
layerrule = animation fade, match:namespace wayfreeze

# Fuzzel
layerrule = animation popin 80%, match:namespace launcher
layerrule = blur on, match:namespace launcher

# Shell
layerrule = no_anim on, match:namespace caelestia-(launcher|osd|notifications|border-exclusion|area-picker)
layerrule = animation fade, match:namespace caelestia-(drawers|background)
layerrule = order 1, match:namespace caelestia-border-exclusion
layerrule = order 2, match:namespace caelestia-bar

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.



# ######## Workspace rules ########

# Pinned windows border /dwilin mode only
windowrule = border_color rgb($tertiary) rgba($tertiary88), match:pin true
# gaps higher when single window
workspace = w[tv1]s[false], gapsout:10, gapsin:10
workspace = f[1]s[false], gapsout:10, gapsin:10
# Transparency for not fullscreen windows
windowrule = opacity 0.95 override, match:fullscreen false
windowrule = opacity 0.95 override, match:fullscreen true
windowrule = opacity 0.95 override, match:fullscreen false, match:class zen|firefox|GitHub Desktop|cod(e|ium)|Postman|Insomnia|chrome|chromium
windowrule = opacity 1 override, match:fullscreen true, match:class zen|firefox|GitHub Desktop|cod(e|ium)|Postman|Insomnia|chrome|chromium
